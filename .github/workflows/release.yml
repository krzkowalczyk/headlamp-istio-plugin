name: Release Plugin

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint "src/**/*.{ts,tsx}"

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Package
        run: npm run package

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute checksum
        id: checksum
        run: |
          ARCHIVE=$(ls *.tar.gz)
          CHECKSUM=$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')
          echo "checksum=SHA256:${CHECKSUM}" >> "$GITHUB_OUTPUT"
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Update artifacthub-pkg.yml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHECKSUM="${{ steps.checksum.outputs.checksum }}"
          ARCHIVE="${{ steps.checksum.outputs.archive }}"
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          URL="https://github.com/${REPO}/releases/download/${TAG}/${ARCHIVE}"

          sed -i "s|^version:.*|version: ${VERSION}|" artifacthub-pkg.yml
          sed -i "s|headlamp/plugin/archive-url:.*|headlamp/plugin/archive-url: \"${URL}\"|" artifacthub-pkg.yml
          sed -i "s|headlamp/plugin/archive-checksum:.*|headlamp/plugin/archive-checksum: \"${CHECKSUM}\"|" artifacthub-pkg.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.checksum.outputs.archive }}
          generate_release_notes: true

      - name: Commit updated artifacthub-pkg.yml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add artifacthub-pkg.yml
          git diff --cached --quiet || git commit -m "Update artifacthub-pkg.yml for ${{ github.ref_name }}"
          git push
